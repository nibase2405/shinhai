name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: digitalocean-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Droplet
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_PORT: ${{ secrets.DO_PORT }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          NEXT_PUBLIC_ADSENSE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_ADSENSE_CLIENT_ID }}
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
          CLARITY_PROJECT_ID: ${{ secrets.CLARITY_PROJECT_ID }}
          TRAVELPAYOUTS_API_TOKEN: ${{ secrets.TRAVELPAYOUTS_API_TOKEN }}
          TRAVELPAYOUTS_MARKER: ${{ secrets.TRAVELPAYOUTS_MARKER }}
          TRAVELPAYOUTS_TRS: ${{ secrets.TRAVELPAYOUTS_TRS }}
        run: |
          set -euo pipefail

          missing=0
          if [ -z "${DO_HOST}" ]; then
            echo "::error::Missing required secret: DO_HOST"
            missing=1
          fi
          if [ -z "${DO_USER}" ]; then
            echo "::error::Missing required secret: DO_USER"
            missing=1
          fi
          if [ -z "${DO_SSH_KEY}" ]; then
            echo "::error::Missing required secret: DO_SSH_KEY"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "${DO_SSH_KEY}" > ~/.ssh/do_deploy_key
          chmod 600 ~/.ssh/do_deploy_key

          ssh-keyscan -p "${DO_PORT:-22}" "${DO_HOST}" >> ~/.ssh/known_hosts

          if [ -n "${NEXT_PUBLIC_SUPABASE_URL}" ] && [ -n "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ] && [ -n "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            cat > .env.production <<EOF
          NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://kimbowl.cc}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
          NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN}
          NEXT_PUBLIC_ADSENSE_CLIENT_ID=${NEXT_PUBLIC_ADSENSE_CLIENT_ID}
          GA4_MEASUREMENT_ID=${GA4_MEASUREMENT_ID}
          CLARITY_PROJECT_ID=${CLARITY_PROJECT_ID}
          TRAVELPAYOUTS_API_TOKEN=${TRAVELPAYOUTS_API_TOKEN}
          TRAVELPAYOUTS_MARKER=${TRAVELPAYOUTS_MARKER}
          TRAVELPAYOUTS_TRS=${TRAVELPAYOUTS_TRS}
          EOF
            scp -i ~/.ssh/do_deploy_key -P "${DO_PORT:-22}" .env.production "${DO_USER}@${DO_HOST}:/var/www/shinhai/.env.production"
          else
            echo "::warning::Supabase secrets are not fully set; keeping the existing Droplet .env.production file."
          fi

          set +e
          deploy_output=$(ssh -i ~/.ssh/do_deploy_key -p "${DO_PORT:-22}" "${DO_USER}@${DO_HOST}" <<'EOF' 2>&1
          set -euo pipefail
          cd /var/www/shinhai
          git pull --ff-only origin main
          bash scripts/deploy.sh
          EOF
          )
          deploy_status=$?
          set -e

          printf '%s\n' "${deploy_output}"

          if [ "${deploy_status}" -ne 0 ]; then
            echo "::error::Remote deploy failed with exit code ${deploy_status}."
            printf '%s\n' "${deploy_output}" | tail -n 40 | while IFS= read -r line; do
              echo "::error::${line}"
            done
            exit "${deploy_status}"
          fi

          echo "::notice::Remote deploy completed."
